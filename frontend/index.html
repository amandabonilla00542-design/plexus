<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Excession LLC — Prime Brokerage &amp; Markets Desk</title>
    <meta
      name="description"

    />

    <meta name="author" content="Excession LLC" />
    <meta name="theme-color" content="#0c1629" />
    <meta name="color-scheme" content="light dark" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Excession LLC" />
    <meta property="og:title" content="Excession LLC — Prime Brokerage &amp; Markets Desk" />

      property="og:description"
      content="Institutional brokerage workspace — DOGE funding, live book marks, and prime desk controls built for serious allocators."
    />
    <meta property="og:url" content="https://bitexcession.pages.dev/" />
    <meta property="og:image" content="https://bitexcession.pages.dev/assets/brand/excession-logo.png" />
    <meta property="og:image:alt" content="Excession LLC logo" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Excession LLC — Prime Brokerage &amp; Markets Desk" />

      name="twitter:description"
      content="Institutional brokerage workspace — DOGE funding, portfolio marks, and prime desk liquidity."

    <link rel="icon" type="image/png" href="/assets/brand/excession-logo.png" />
    <link rel="apple-touch-icon" href="/assets/brand/excession-logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      try {
        var t = localStorage.getItem('excession-theme')
        if (t == null) t = localStorage.getItem('layerdodge-theme')
        if (t == null) t = localStorage.getItem('plexus-theme')
        document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light'
      } catch (e) {
        document.documentElement.dataset.theme = 'light'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
