<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" role="img" aria-label="Excession LLC">
  <defs>
    <linearGradient id="bg" x1="8%" y1="6%" x2="92%" y2="94%">
      <stop offset="0%" stop-color="#061018"/>
      <stop offset="45%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#1a5c96"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#a67c1a"/>
      <stop offset="50%" stop-color="#e8c86a"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Full-bleed circle (home screen / maskable) -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#ring)" stroke-width="10"/>
  <!-- Vector fallback when excession-logo.png is missing -->
  <g filter="url(#shadow)">
    <path
      d="M168 148h108c52 0 88 32 88 82 0 34-16 58-44 72l56 62h-52l-48-54h-48v54h-60V148zm60 120h42c28 0 44-14 44-38s-16-38-44-38h-42v76z"
      fill="#ffffff"
    />
    <text
      x="256"
      y="398"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="36"
      font-weight="700"
      letter-spacing="0.28em"
      fill="#e8c86a"
    >LLC</text>
  </g>
  <!-- Your PNG logo (place excession-logo.png in this folder) -->
  <image
    xlink:href="excession-logo.png"
    href="excession-logo.png"
    x="118"
    y="108"
    width="276"
    height="276"
    preserveAspectRatio="xMidYMid meet"
  />
</svg>
