<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Excession LLC — admin treasury console" />
    <meta name="apple-mobile-web-app-title" content="Excession" />
    <meta name="theme-color" content="#0a0e14" />
    <title>Excession · Admin</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/brand/pwa-icon.svg" />
    <link rel="apple-touch-icon" href="/assets/brand/pwa-icon.svg" />
    <script>
      try {
        var t =
          localStorage.getItem('excession-theme') ||
          localStorage.getItem('plexus-theme') ||
          localStorage.getItem('layerdodge-theme')
        document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light'
      } catch (e) {
        document.documentElement.dataset.theme = 'light'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
